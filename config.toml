# deepagents-cli config
# Loaded from ~/.deepagents/config.toml by default.
# This repo keeps a tracked copy; symlink or copy into ~/.deepagents/ to activate.

[models]
default = "ollama:nemotron-cascade-2:30b"

[models.providers.ollama]
models = [
  "nemotron-cascade-2:30b",
  "nemotron-3-super:latest",
  "nemotron-3-nano-32k:latest",
  "nemotron-3-nano:30b",
  "qwen2.5:7b",
  "qwen2.5:3b",
  "gemma4:31b",
]
base_url = "http://localhost:11434"
enabled = true

[models.providers.ollama.params]
temperature = 0
num_ctx = 8192

[models.providers.ollama.params."qwen2.5:7b"]
num_ctx = 32768

[models.providers.ollama.params."nemotron-cascade-2:30b"]
num_ctx = 32768

[models.providers.ollama.params."nemotron-3-super:latest"]
num_ctx = 32768

[models.providers.ollama.params."nemotron-3-nano-32k:latest"]
num_ctx = 32768

[models.providers.ollama.profile]
tool_calling = true
max_input_tokens = 8192
max_output_tokens = 4096

[models.providers.ollama.profile."qwen2.5:7b"]
tool_calling = true
max_input_tokens = 32768
max_output_tokens = 8192

[models.providers.ollama.profile."nemotron-cascade-2:30b"]
tool_calling = true
max_input_tokens = 32768
max_output_tokens = 8192

[models.providers.ollama.profile."nemotron-3-super:latest"]
tool_calling = true
max_input_tokens = 32768
max_output_tokens = 8192

[models.providers.ollama.profile."nemotron-3-nano-32k:latest"]
tool_calling = true
max_input_tokens = 32768
max_output_tokens = 8192

[models.providers.ollama.profile."nemotron-3-nano:30b"]
tool_calling = true
max_input_tokens = 8192
max_output_tokens = 4096
